spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:jobpilot_test;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-test.sql
  data:
    redis:
      host: localhost
      port: 6379

jobpilot:
  jwt:
    secret: test-secret-with-at-least-32-characters
    expiration-minutes: 60
  qdrant:
    host: http://localhost:6333
    collection: jobpilot_questions
