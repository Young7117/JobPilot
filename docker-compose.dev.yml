services:
  mysql:
    image: mysql:8.4
    container_name: jobpilot-mysql-dev
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-jobpilot_ai}
      MYSQL_USER: ${MYSQL_USER:-jobpilot}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-jobpilot_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - jobpilot-mysql-data:/var/lib/mysql
      - ./deploy/mysql/init:/docker-entrypoint-initdb.d:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: jobpilot-redis-dev
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - jobpilot-redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: jobpilot-qdrant-dev
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - jobpilot-qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  jobpilot-mysql-data:
  jobpilot-redis-data:
  jobpilot-qdrant-data:
