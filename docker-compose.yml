version: "3.8"

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-jobpilot_ai}
      MYSQL_USER: ${MYSQL_USER:-jobpilot}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-jobpilot_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    volumes:
      - jobpilot-mysql-data:/var/lib/mysql
      - ./deploy/mysql/init:/docker-entrypoint-initdb.d:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - jobpilot-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.12.4
    restart: unless-stopped
    volumes:
      - jobpilot-qdrant-data:/qdrant/storage
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
      - qdrant
    environment:
      BACKEND_PORT: 8080
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-jobpilot_ai}
      DB_USERNAME: ${MYSQL_USER:-jobpilot}
      DB_PASSWORD: ${MYSQL_PASSWORD:-jobpilot_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QDRANT_HOST: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-jobpilot_questions}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-1440}
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      AI_MODEL: ${AI_MODEL:-mock-chat}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-mock}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-mock-embedding}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1536}
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  jobpilot-mysql-data:
  jobpilot-redis-data:
  jobpilot-qdrant-data:
